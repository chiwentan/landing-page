<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — lost in the void</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👻</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="bg"></canvas>
    <div class="container four-oh-four">
        <h1 class="glitch-text">404</h1>
        <p class="animated-text-404">lost in the void...</p>
        <a class="home-btn" onclick="navigateFade('index.html')">go home</a>
    </div>
    <script src="particles.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requestAnimationFrame(() => document.body.classList.add('loaded'));
        });
        function navigateFade(url) {
            document.body.classList.remove('loaded');
            setTimeout(() => location.href = url, 320);
        }
    </script>
</body>
</html>
